---
- name: Task testing
  hosts: gdansk
  vars:
    package: scren
  tasks:
    - block:
        - name: "{{ package }} installation"
          dnf:
            name: "{{ package }}"
            state: latest

      rescue:
        - name: Info 1
          debug:
            msg:  "Executes on rescue, when task inside a block ends with an error!"

      always:
        - name: Info 2
          debug:
            msg: "I am always executing!"

    - name: Next task
      debug:
        msg: "Next task was started..."
