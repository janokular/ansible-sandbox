---
# tasks file for apache
- name: Installing Apache
  ansible.builtin.apt:
    name: apache2
    state: latest
    update_cache: true

- name: Creating HTML page
  ansible.builtin.shell:
    cmd: echo "Hello From The Ansible" > /var/www/html/index.html
  args:
    executable: /bin/bash
  notify:
    - reload apache

- name: Public IP
  ansible.builtin.shell:
    cmd: ip -4 -br a
  register: ip

- ansible.builtin.debug: var=ip.stdout_lines
