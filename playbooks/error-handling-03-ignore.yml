---
- name: Error handling
  hosts: server01
  vars:
    package: nginxxx
  tasks:
    - name: Trying to install {{ package }}
      ansible.builtin.apt:
        name: "{{ package  }}"
        state: present
        update_cache: true
      ignore_errors: true
    
    - name: Next Task
      ansible.builtin.debug:
        msg: "Next task has been executed"
