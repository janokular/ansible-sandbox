---
- name: Error handling
  hosts: server00
  tasks:
    - name: Time change
      ansible.builtin.lineinfile:
        path: /etc/chrony/chrony.conf
        regexp: "^pool 2."
        line: "server base iburst"
      notify: restart chronyd
      changed_when: true

  handlers:
    - name: restart chronyd
      ansible.builtin.systemd_service:
        name: chronyd
        state: restarted
