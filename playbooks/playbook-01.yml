---
- name: Playbook
  hosts: all
  tasks:
    - name: Adding group
      ansible.builtin.group:
        name: it
        state: present

    - name: Adding user
      ansible.builtin.user:
        name: jan
        state: present
        group: it

    - name: Copying file
      ansible.builtin.copy:
        src: ../files/file_01
        dest: /home/jan/
        owner: jan
        mode: 0700
