---
- name: Loops
  hosts: all
  vars:
    packages:
      - nano
      - vim
      - tree
  tasks:
    - name: Installing software
      ansible.builtin.apt:
        name: "{{ item  }}"
        state: present
        update_cache: yes
      loop: "{{ packages }}"

    - name: Uninstalling software
      ansible.builtin.apt:
        name: "{{ item  }}"
        state: absent
      loop: "{{ packages }}"
