---
- name: Playbook
  hosts: web
  tasks:
    - name: Installing Nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Restarting Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Removing Nginx
      ansible.builtin.apt:
        name: nginx
        state: absent
