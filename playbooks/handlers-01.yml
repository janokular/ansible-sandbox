---
- name: Handlers
  hosts: web
  tasks:
    - name: Installing Nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes
      notify:
        - restart nginx

    - name: Installing nano
      ansible.builtin.apt:
        name: nano
        state: present
        update_cache: yes
      notify:
        - restart nginx

    - name: Installing Vim
      ansible.builtin.apt:
        name: vim
        state: present
        update_cache: yes
      notify:
        - restart nginx

  handlers:
    - name: restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
